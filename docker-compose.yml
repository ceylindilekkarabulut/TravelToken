services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: throne_postgres
    environment:
      POSTGRES_USER: throne
      POSTGRES_PASSWORD: throne
      POSTGRES_DB: throne_travel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: throne_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
